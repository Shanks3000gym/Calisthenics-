<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cali Tracker">
<meta name="theme-color" content="#0f1a0f">
<title>Cali Tracker</title>
<style>
:root {
  --green: #4ade80;
  --green-dark: #16a34a;
  --green-dim: #1a3a1a;
  --green-mid: #22c55e;
  --bg: #0a120a;
  --surface: #121f12;
  --surface2: #1a2e1a;
  --border: #2a3f2a;
  --text: #e8f5e8;
  --muted: #7a9a7a;
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: var(--bg); color: var(--text); }
.app { display: flex; flex-direction: column; height: 100dvh; max-width: 430px; margin: 0 auto; }
.content { flex: 1; overflow-y: auto; padding: 0 16px 24px; -webkit-overflow-scrolling: touch; }
.content::-webkit-scrollbar { display: none; }

.header { padding: 52px 20px 16px; display: flex; align-items: flex-end; justify-content: space-between; }
.header-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.header-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
.streak-badge { display: flex; flex-direction: column; align-items: center; background: var(--green-dim); border: 1px solid var(--border); border-radius: 12px; padding: 8px 14px; }
.streak-num { font-size: 22px; font-weight: 700; color: var(--green); line-height: 1; }
.streak-label { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.05em; }

.tabbar { display: flex; padding: 0 16px 12px; gap: 6px; }
.tab { flex: 1; padding: 9px 4px; font-size: 12px; font-weight: 600; text-align: center; border-radius: var(--radius-sm); border: 1px solid var(--border); color: var(--muted); background: var(--surface); cursor: pointer; transition: all 0.15s; }
.tab.active { background: var(--green-dim); border-color: var(--green-dark); color: var(--green); }

.view { display: none; }
.view.active { display: block; }
.section-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin: 20px 0 10px; }

.week-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.week-nav-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.week-info { flex: 1; }
.week-title { font-size: 18px; font-weight: 600; }
.week-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

.prog-wrap { height: 5px; background: var(--surface2); border-radius: 3px; margin-bottom: 18px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--green-mid); border-radius: 3px; transition: width 0.4s ease; }

.day-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; transition: border-color 0.2s; }
.day-card.done { border-color: var(--green-dark); }
.day-head { display: flex; align-items: center; padding: 14px 16px; cursor: pointer; gap: 12px; }
.day-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.day-card.done .day-icon { background: var(--green-dim); }
.day-meta { flex: 1; min-width: 0; }
.day-name { font-size: 15px; font-weight: 600; }
.day-type { font-size: 12px; color: var(--muted); margin-top: 2px; }
.day-date { font-size: 11px; color: var(--green); margin-top: 2px; }
.day-check { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; flex-shrink: 0; }
.day-card.done .day-check { background: var(--green-mid); border-color: var(--green-mid); color: #0a120a; font-weight: 700; }

.exercises { display: none; border-top: 1px solid var(--border); }
.day-card.open .exercises { display: block; }
.ex-item { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.ex-item:last-child { border-bottom: none; }
.ex-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.ex-name { font-size: 14px; font-weight: 500; }
.ex-target { font-size: 11px; color: var(--muted); margin-top: 1px; }
.ex-done-btn { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--border); background: none; color: var(--muted); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
.ex-done-btn.active { background: var(--green-mid); border-color: var(--green-mid); color: #0a120a; }
.ex-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ex-field { display: flex; flex-direction: column; gap: 4px; }
.ex-field label { font-size: 10px; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
.ex-field input, .ex-field textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; padding: 8px 10px; font-family: inherit; outline: none; width: 100%; }
.ex-field input:focus, .ex-field textarea:focus { border-color: var(--green-dark); }
.ex-field.full { grid-column: 1 / -1; }
.ex-field textarea { resize: none; height: 60px; font-size: 13px; }

.day-footer { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; }
.rpe-row { display: flex; align-items: center; gap: 10px; }
.rpe-label { font-size: 12px; color: var(--muted); flex-shrink: 0; }
.rpe-btns { display: flex; gap: 5px; flex-wrap: wrap; }
.rpe-btn { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.rpe-btn.sel { color: #0a120a; font-weight: 700; }
.rpe-btn[data-v="1"].sel,.rpe-btn[data-v="2"].sel,.rpe-btn[data-v="3"].sel { background: #22c55e; border-color: #22c55e; }
.rpe-btn[data-v="4"].sel,.rpe-btn[data-v="5"].sel,.rpe-btn[data-v="6"].sel { background: #fbbf24; border-color: #fbbf24; }
.rpe-btn[data-v="7"].sel,.rpe-btn[data-v="8"].sel { background: #fb923c; border-color: #fb923c; }
.rpe-btn[data-v="9"].sel,.rpe-btn[data-v="10"].sel { background: #f87171; border-color: #f87171; }
.complete-btn { width: 100%; padding: 13px; background: var(--green-dark); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; }
.complete-btn:active { opacity: 0.8; }
.done-tag { text-align: center; color: var(--green); font-size: 13px; font-weight: 600; padding: 4px 0; }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.stat-val { font-size: 26px; font-weight: 700; color: var(--green); }
.stat-lbl { font-size: 12px; color: var(--muted); margin-top: 3px; }

.weight-row { display: flex; gap: 8px; margin-bottom: 12px; }
.weight-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 15px; padding: 10px 12px; font-family: inherit; outline: none; }
.weight-row input:focus { border-color: var(--green-dark); }
.weight-row button { padding: 10px 18px; background: var(--green-dark); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; }
.weight-list { display: flex; flex-direction: column; gap: 6px; }
.weight-entry { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); }
.weight-kg { font-size: 16px; font-weight: 600; color: var(--green); }
.weight-date { font-size: 12px; color: var(--muted); }
.weight-del { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 0 4px; }

.chart-wrap { display: flex; align-items: flex-end; gap: 4px; height: 80px; margin-bottom: 6px; }
.chart-bar { flex: 1; border-radius: 4px 4px 0 0; min-height: 4px; background: var(--green-dim); }
.chart-bar.has { background: var(--green-mid); }
.chart-xlabels { display: flex; gap: 4px; }
.chart-xlabels span { flex: 1; font-size: 9px; color: var(--muted); text-align: center; }

.pr-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; }
.pr-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); gap: 12px; }
.pr-row:last-child { border-bottom: none; }
.pr-name { flex: 1; font-size: 14px; }
.pr-input { width: 80px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; padding: 7px 10px; font-family: inherit; outline: none; text-align: right; }
.pr-input:focus { border-color: var(--green-dark); }

.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--green-dark); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 999; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-title">Cali Tracker</div>
      <div class="header-sub" id="header-sub">Woche 1</div>
    </div>
    <div class="streak-badge">
      <div class="streak-num" id="streak-num">0</div>
      <div class="streak-label">WOCHEN 🔥</div>
    </div>
  </div>

  <div class="tabbar">
    <div class="tab active" onclick="switchTab('training')">Training</div>
    <div class="tab" onclick="switchTab('stats')">Stats</div>
    <div class="tab" onclick="switchTab('gewicht')">Gewicht</div>
    <div class="tab" onclick="switchTab('prs')">PRs</div>
  </div>

  <div class="content">
    <div id="view-training" class="view active">
      <div class="week-nav">
        <button class="week-nav-btn" onclick="changeWeek(-1)">‹</button>
        <div class="week-info">
          <div class="week-title" id="wk-title">Woche 1 / 12</div>
          <div class="week-sub" id="wk-sub">0 / 3 Einheiten</div>
        </div>
        <button class="week-nav-btn" onclick="changeWeek(1)">›</button>
      </div>
      <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
      <div id="day-list"></div>
    </div>

    <div id="view-stats" class="view">
      <div class="section-label">Übersicht</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-val" id="s-weeks">0</div><div class="stat-lbl">Wochen aktiv</div></div>
        <div class="stat-box"><div class="stat-val" id="s-sessions">0</div><div class="stat-lbl">Einheiten gesamt</div></div>
        <div class="stat-box"><div class="stat-val" id="s-streak">0</div><div class="stat-lbl">Wochen am Stück</div></div>
        <div class="stat-box"><div class="stat-val">12</div><div class="stat-lbl">Wochen Programm</div></div>
      </div>
      <div class="section-label">Einheiten pro Woche</div>
      <div class="chart-wrap" id="chart-bars"></div>
      <div class="chart-xlabels" id="chart-labels"></div>
    </div>

    <div id="view-gewicht" class="view">
      <div class="section-label">Gewicht eintragen</div>
      <div class="weight-row">
        <input type="number" id="weight-input" placeholder="z.B. 79.5" step="0.1" min="40" max="200">
        <button onclick="addWeight()">+ Eintrag</button>
      </div>
      <div class="section-label">Verlauf</div>
      <div id="weight-list"></div>
    </div>

    <div id="view-prs" class="view">
      <div class="section-label">Persönliche Rekorde</div>
      <div class="pr-card" id="pr-list"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS = [
  { name:'Einheit 1', type:'Push', icon:'💪', exercises:[
    {n:'Liegestütze', t:'4×10–15', timed:false},
    {n:'Diamond Push-Ups', t:'3×8–12', timed:false},
    {n:'Pike Push-Ups', t:'3×8–12', timed:false},
    {n:'Dips', t:'3×max', timed:false},
    {n:'Plank', t:'3×45 Sek', timed:true}
  ]},
  { name:'Einheit 2', type:'Pull', icon:'🏋️', exercises:[
    {n:'Klimmzüge', t:'5 Sätze', timed:false},
    {n:'Negative Klimmzüge', t:'3×5', timed:false},
    {n:'Australische Klimmzüge', t:'4×10–15', timed:false},
    {n:'Dead Hang', t:'3×30 Sek', timed:true},
    {n:'Beinheben', t:'3×10–15', timed:false}
  ]},
  { name:'Einheit 3', type:'Athletik', icon:'⚡', exercises:[
    {n:'Kniebeugen', t:'3×20', timed:false},
    {n:'Bulgarian Split Squats', t:'3×10/Bein', timed:false},
    {n:'Glute Bridge', t:'3×15', timed:false},
    {n:'Wadenheber', t:'3×20', timed:false},
    {n:'Seitstütz', t:'3×30 Sek', timed:true}
  ]},
  { name:'Einheit 4', type:'Mix (optional)', icon:'🔄', exercises:[
    {n:'Klimmzüge', t:'3–4 Runden', timed:false},
    {n:'Liegestütze', t:'3–4 Runden', timed:false},
    {n:'Australische Klimmzüge', t:'3–4 Runden', timed:false},
    {n:'Plank', t:'3–4 Runden', timed:true}
  ]}
];

const PRS = [
  {n:'Klimmzüge (max)', k:'pr_pu'},
  {n:'Liegestütze (max)', k:'pr_lh'},
  {n:'Dips (max)', k:'pr_dips'},
  {n:'Dead Hang (Sek)', k:'pr_dh'},
  {n:'Plank (Sek)', k:'pr_pl'}
];

let state = {};
let currentWeek = 1;

function load() { try { state = JSON.parse(localStorage.getItem('cali_v3') || '{}'); } catch(e) { state = {}; } }
function save() { try { localStorage.setItem('cali_v3', JSON.stringify(state)); } catch(e) {} }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', ['training','stats','gewicht','prs'][i] === t));
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+t).classList.add('active');
  if (t === 'stats') renderStats();
  if (t === 'gewicht') renderWeight();
  if (t === 'prs') renderPRs();
}

function changeWeek(d) {
  currentWeek = Math.max(1, Math.min(12, currentWeek + d));
  renderTraining();
}

function dKey(w, d) { return `w${w}d${d}`; }
function exKey(w, d, e, f) { return `w${w}d${d}e${e}_${f}`; }

function toggleDay(i) {
  document.querySelectorAll('.day-card').forEach((c, j) => {
    if (j === i) c.classList.toggle('open');
    else c.classList.remove('open');
  });
}

function toggleExDone(w, d, e) {
  const k = exKey(w, d, e, 'done');
  state[k] = !state[k];
  save();
  renderTraining();
}

function setField(w, d, e, f, val) {
  state[exKey(w, d, e, f)] = val;
  save();
}

function setRPE(w, d, v) {
  state[`rpe_${dKey(w,d)}`] = v;
  save();
  document.querySelectorAll(`.rpe-btn[data-day="${d}"]`).forEach(b => b.classList.toggle('sel', parseInt(b.dataset.v) === v));
}

function completeDay(w, d) {
  state[dKey(w, d)] = true;
  state[`date_${dKey(w,d)}`] = new Date().toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit', year:'numeric'});
  save();
  toast('Einheit abgeschlossen 🎉');
  renderTraining();
  updateStreak();
}

function calcStreak() {
  let streak = 0;
  for (let w = currentWeek; w >= 1; w--) {
    const c = DAYS.slice(0,3).filter((_, i) => state[dKey(w,i)]).length;
    if (c >= 2) streak++; else break;
  }
  return streak;
}

function updateStreak() {
  document.getElementById('streak-num').textContent = calcStreak();
}

function renderTraining() {
  const doneCount = DAYS.slice(0,3).filter((_, i) => state[dKey(currentWeek, i)]).length;
  document.getElementById('wk-title').textContent = `Woche ${currentWeek} / 12`;
  document.getElementById('wk-sub').textContent = `${doneCount} / 3 Einheiten abgeschlossen`;
  document.getElementById('prog').style.width = Math.round((doneCount/3)*100) + '%';
  document.getElementById('header-sub').textContent = `Woche ${currentWeek} von 12`;
  updateStreak();

  const list = document.getElementById('day-list');
  list.innerHTML = '';

  DAYS.forEach((day, i) => {
    const done = !!state[dKey(currentWeek, i)];
    const rpe = state[`rpe_${dKey(currentWeek,i)}`] || 0;
    const trainDate = state[`date_${dKey(currentWeek,i)}`] || '';
    const exDone = day.exercises.filter((_, j) => state[exKey(currentWeek, i, j, 'done')]).length;

    const exHtml = day.exercises.map((ex, j) => {
      const isDone = !!state[exKey(currentWeek, i, j, 'done')];
      const reps = state[exKey(currentWeek, i, j, 'reps')] || '';
      const time = state[exKey(currentWeek, i, j, 'time')] || '';
      const note = state[exKey(currentWeek, i, j, 'note')] || '';
      return `<div class="ex-item">
        <div class="ex-header">
          <div>
            <div class="ex-name">${ex.n}</div>
            <div class="ex-target">${ex.t}</div>
          </div>
          <button class="ex-done-btn ${isDone?'active':''}" onclick="toggleExDone(${currentWeek},${i},${j})">${isDone?'✓':'○'}</button>
        </div>
        <div class="ex-inputs">
          <div class="ex-field">
            <label>${ex.timed ? 'Zeit (Sek)' : 'Wiederholungen'}</label>
            <input type="number" placeholder="${ex.timed?'30':'10'}" value="${ex.timed?time:reps}"
              onchange="setField(${currentWeek},${i},${j},'${ex.timed?'time':'reps'}',this.value)">
          </div>
          <div class="ex-field">
            <label>${ex.timed ? 'Sätze' : 'Zeit (Sek)'}</label>
            <input type="number" placeholder="${ex.timed?'3':'–'}" value="${ex.timed?reps:time}"
              onchange="setField(${currentWeek},${i},${j},'${ex.timed?'reps':'time'}',this.value)">
          </div>
          <div class="ex-field full">
            <label>Notiz</label>
            <textarea placeholder="Wie war's? Was fiel auf?" onchange="setField(${currentWeek},${i},${j},'note',this.value)">${note}</textarea>
          </div>
        </div>
      </div>`;
    }).join('');

    const rpeHtml = Array.from({length:10},(_,k)=>{
      const v=k+1;
      return `<button class="rpe-btn ${rpe===v?'sel':''}" data-v="${v}" data-day="${i}" onclick="setRPE(${currentWeek},${i},${v})">${v}</button>`;
    }).join('');

    const card = document.createElement('div');
    card.className = 'day-card' + (done?' done':'');
    card.innerHTML = `
      <div class="day-head" onclick="toggleDay(${i})">
        <div class="day-icon">${day.icon}</div>
        <div class="day-meta">
          <div class="day-name">${day.name}</div>
          <div class="day-type">${day.type} · ${exDone}/${day.exercises.length} Übungen</div>
          ${trainDate ? `<div class="day-date">📅 ${trainDate}</div>` : ''}
        </div>
        <div class="day-check">${done?'✓':'›'}</div>
      </div>
      <div class="exercises">
        ${exHtml}
        <div class="day-footer">
          <div class="rpe-row">
            <span class="rpe-label">Anstrengung</span>
            <div class="rpe-btns">${rpeHtml}</div>
          </div>
          ${!done
            ? `<button class="complete-btn" onclick="completeDay(${currentWeek},${i})">Einheit abschließen ✓</button>`
            : `<div class="done-tag">✓ Abgeschlossen${rpe?' · RPE '+rpe:''}${trainDate?' · '+trainDate:''}</div>`}
        </div>
      </div>`;
    list.appendChild(card);
  });
}

function renderStats() {
  let total = 0, active = 0;
  const counts = [];
  for (let w = 1; w <= 12; w++) {
    const c = DAYS.filter((_, i) => state[dKey(w,i)]).length;
    counts.push(c); total += c; if(c>0) active++;
  }
  document.getElementById('s-weeks').textContent = active;
  document.getElementById('s-sessions').textContent = total;
  document.getElementById('s-streak').textContent = calcStreak();
  const max = Math.max(...counts, 1);
  document.getElementById('chart-bars').innerHTML = counts.map((c,i) =>
    `<div class="chart-bar ${c>0?'has':''}" style="height:${Math.max(4,Math.round((c/max)*76))}px"></div>`).join('');
  document.getElementById('chart-labels').innerHTML = counts.map((_,i) =>
    `<span>W${i+1}</span>`).join('');
}

function addWeight() {
  const inp = document.getElementById('weight-input');
  const val = parseFloat(inp.value);
  if (!val||val<30||val>300) { toast('Ungültiger Wert'); return; }
  const entries = state.weights || [];
  entries.unshift({ kg: val, date: new Date().toLocaleDateString('de-DE') });
  state.weights = entries.slice(0,50);
  save(); inp.value = '';
  renderWeight(); toast(`${val} kg eingetragen`);
}

function deleteWeight(i) {
  state.weights = (state.weights||[]).filter((_,j)=>j!==i);
  save(); renderWeight();
}

function renderWeight() {
  const entries = state.weights || [];
  const list = document.getElementById('weight-list');
  if (!entries.length) { list.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">Noch keine Einträge</div>'; return; }
  list.innerHTML = entries.map((e,i) =>
    `<div class="weight-entry">
      <div><div class="weight-kg">${e.kg} kg</div><div class="weight-date">${e.date}</div></div>
      <button class="weight-del" onclick="deleteWeight(${i})">×</button>
    </div>`).join('');
}

function renderPRs() {
  document.getElementById('pr-list').innerHTML = PRS.map(pr => {
    const val = state[pr.k] || '';
    return `<div class="pr-row">
      <div class="pr-name">${pr.n}</div>
      <input class="pr-input" type="number" placeholder="–" value="${val}"
        onchange="state['${pr.k}']=this.value;save();toast('PR gespeichert ✓')">
    </div>`;
  }).join('');
}

load();
renderTraining();
</script>
</body>
</html>
